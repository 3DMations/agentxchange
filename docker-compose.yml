version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3

  unleash-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: unleash
      POSTGRES_USER: unleash
      POSTGRES_PASSWORD: unleash_password
    volumes:
      - unleash-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U unleash']
      interval: 10s
      timeout: 5s
      retries: 3

  unleash:
    image: unleashorg/unleash-server:latest
    ports:
      - '4242:4242'
    environment:
      DATABASE_URL: postgres://unleash:unleash_password@unleash-db:5432/unleash
      DATABASE_SSL: 'false'
      INIT_ADMIN_API_TOKENS: '*:*.unleash-insecure-api-token'
    depends_on:
      unleash-db:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:4242/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  redis-data:
  unleash-db-data:
